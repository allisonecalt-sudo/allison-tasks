<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tasks — Allison</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f5f4f0;
  --surface: #fff;
  --surface2: #f0efeb;
  --surface3: #e8e7e2;
  --border: #dddbd4;
  --text: #1a1915;
  --muted: #6b6960;
  --dim: #a09e96;
  --accent: #2d6a4f;
  --abright: #40916c;
  --asoft: rgba(45,106,79,.10);
  --green: #2d6a4f;
  --gsoft: rgba(45,106,79,.12);
  --amber: #b5621a;
  --ambersoft: rgba(181,98,26,.12);
  --red: #c0392b;
  --rsoft: rgba(192,57,43,.12);
  --blue: #2563eb;
  --bluesoft: rgba(37,99,235,.10);
  --shadow: 0 2px 8px rgba(26,25,21,.08);
  --shadowlg: 0 8px 32px rgba(26,25,21,.12);
  --r: 10px;
  --rl: 16px;
  --energy-low: #2d6a4f;
  --energy-med: #b5621a;
  --energy-high: #c0392b;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  min-height: 100dvh;
  font-size: 14px;
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}
button { font-family: inherit; cursor: pointer; }
input, select, textarea { font-family: inherit; }

/* ── Auth Screen ── */
.auth-screen {
  display: flex; align-items: center; justify-content: center;
  min-height: 100vh; min-height: 100dvh; padding: 2rem;
}
.auth-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--rl); padding: 2.5rem 2rem; width: 100%;
  max-width: 380px; box-shadow: var(--shadowlg); text-align: center;
}
.auth-card h1 { font-size: 1.4rem; font-weight: 700; margin-bottom: .3rem; }
.auth-card p { font-size: .85rem; color: var(--muted); margin-bottom: 1.5rem; }
.auth-input {
  width: 100%; padding: .7rem 1rem; border: 1px solid var(--border);
  border-radius: var(--r); font-size: .9rem; margin-bottom: .75rem;
  background: var(--surface2); outline: none; direction: ltr; text-align: left;
}
.auth-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--asoft); }
.auth-btn {
  width: 100%; padding: .75rem; background: var(--accent); color: #fff;
  border: none; border-radius: var(--r); font-size: .9rem; font-weight: 600;
  margin-top: .5rem; transition: background .15s;
}
.auth-btn:hover { background: var(--abright); }
.auth-btn:disabled { opacity: .5; cursor: not-allowed; }
.auth-error { color: var(--red); font-size: .8rem; margin-top: .75rem; min-height: 1.2em; }

/* ── App Shell ── */
.app { display: none; flex-direction: column; min-height: 100vh; min-height: 100dvh; }
.app.visible { display: flex; }

/* Header */
.hdr {
  background: var(--surface); border-bottom: 1px solid var(--border);
  padding: .6rem 1rem; display: flex; align-items: center;
  justify-content: space-between; position: sticky; top: 0;
  z-index: 100; box-shadow: var(--shadow);
}
.hdr-left { display: flex; flex-direction: column; gap: .05rem; }
.hdr-greeting { font-size: .72rem; font-weight: 500; color: var(--muted); }
.hdr-date { font-size: .95rem; font-weight: 700; }
.hdr-actions { display: flex; gap: .5rem; align-items: center; }
.hdr-btn {
  background: none; border: 1px solid var(--border); border-radius: var(--r);
  padding: .35rem .6rem; font-size: .75rem; color: var(--muted);
  display: flex; align-items: center; gap: .3rem;
}
.hdr-btn:hover { background: var(--surface2); color: var(--text); }

/* ── Ribbon ── */
.ribbon {
  background: var(--surface); border-bottom: 1px solid var(--border);
  padding: .5rem .75rem; position: sticky; top: 49px; z-index: 90;
  box-shadow: var(--shadow);
}
.ribbon-grid {
  display: grid; grid-template-columns: repeat(6, 1fr);
  gap: .4rem; max-width: 700px; margin: 0 auto;
}
@media (max-width: 600px) {
  .ribbon-grid { grid-template-columns: repeat(3, 1fr); }
  .ribbon.collapsed .ribbon-grid { display: none; }
  .ribbon-summary {
    display: none;
    font-size: .78rem;
    font-weight: 500;
    color: var(--muted);
    text-align: center;
    padding: .2rem 0;
    cursor: pointer;
  }
  .ribbon.collapsed .ribbon-summary { display: block; }
  .ribbon-summary:hover { color: var(--text); }
}
.ribbon-stat {
  text-align: center; padding: .3rem .25rem;
  border-radius: 8px; background: var(--surface2);
  cursor: pointer; transition: all .15s;
}
.ribbon-stat:hover { background: var(--surface3); transform: translateY(-1px); }
.ribbon-stat:active { transform: translateY(0); }
.ribbon-label {
  font-size: .55rem; font-weight: 700; text-transform: uppercase;
  letter-spacing: .06em; color: var(--muted); line-height: 1.2;
}
.ribbon-val {
  font-family: 'DM Mono', monospace; font-size: 1rem; font-weight: 600;
  line-height: 1.3;
}
.ribbon-val.amber { color: var(--amber); }
.ribbon-val.blue { color: var(--blue); }

/* ── Tab Bar ── */
.tab-bar {
  background: var(--surface); border-bottom: 1px solid var(--border);
  display: flex; overflow-x: auto; scrollbar-width: none;
  -webkit-overflow-scrolling: touch; position: sticky;
  top: 107px; z-index: 80;
}
@media (max-width: 600px) {
  .tab-bar { top: 139px; }
}
.tab-bar::-webkit-scrollbar { display: none; }
.tab-btn {
  flex-shrink: 0; padding: .55rem .85rem; border: none; background: none;
  font-size: .78rem; font-weight: 500; color: var(--muted);
  border-bottom: 2px solid transparent; white-space: nowrap;
  transition: all .15s;
}
.tab-btn:hover { color: var(--text); background: var(--surface2); }
.tab-btn.active {
  color: var(--accent); border-bottom-color: var(--accent); font-weight: 600;
}
.tab-count {
  font-size: .65rem; font-weight: 600; background: var(--surface2);
  padding: .1rem .35rem; border-radius: 8px; margin-inline-start: .3rem;
}
.tab-btn.active .tab-count { background: var(--asoft); color: var(--accent); }

/* ── Tab More Dropdown ── */
.tab-more-wrap { position: relative; flex-shrink: 0; }
.tab-more-btn {
  padding: .55rem .7rem; border: none; background: none;
  font-size: .85rem; font-weight: 600; color: var(--muted);
  cursor: pointer; border-bottom: 2px solid transparent;
}
.tab-more-btn:hover { color: var(--text); background: var(--surface2); }
.tab-more-btn.has-active { color: var(--accent); border-bottom-color: var(--accent); }
.tab-more-menu {
  display: none; position: absolute; right: 0; top: 100%;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--r); box-shadow: var(--shadowlg);
  z-index: 200; min-width: 140px; padding: .3rem 0;
}
.tab-more-menu.open { display: block; }
.tab-more-menu button {
  display: block; width: 100%; text-align: left;
  padding: .5rem .85rem; border: none; background: none;
  font-size: .8rem; color: var(--text); cursor: pointer;
}
.tab-more-menu button:hover { background: var(--surface2); }
.tab-more-menu button.active { color: var(--accent); font-weight: 600; }

/* ── Main Content ── */
.main-content {
  flex: 1; padding: .75rem; padding-bottom: 5rem;
  max-width: 700px; margin: 0 auto; width: 100%;
}

/* ── Task Cards ── */
.task-card {
  background: var(--surface); border: 1px solid transparent;
  border-radius: var(--r); padding: .65rem .8rem; margin-bottom: .6rem;
  box-shadow: 0 1px 3px rgba(26,25,21,.04); cursor: pointer; transition: all .15s;
  position: relative; overflow: hidden;
}
.task-card:hover { border-color: var(--accent); box-shadow: 0 2px 12px rgba(26,25,21,.12); }
.task-card.aging { border-inline-start: 3px solid #f59e0b; }
.task-card.done-anim {
  opacity: 0; transform: translateX(60px); transition: all .35s ease-out;
}
.task-top { display: flex; align-items: flex-start; gap: .6rem; }
.task-check {
  width: 20px; height: 20px; border: 2px solid var(--border);
  border-radius: 50%; flex-shrink: 0; margin-top: 1px;
  cursor: pointer; transition: all .2s; position: relative;
  display: flex; align-items: center; justify-content: center;
}
.task-check:hover { border-color: var(--accent); background: var(--asoft); }
.task-check.checked {
  border-color: var(--accent); background: var(--accent);
}
.task-check.checked::after {
  content: ''; display: block; width: 6px; height: 10px;
  border: solid #fff; border-width: 0 2px 2px 0;
  transform: rotate(45deg); margin-top: -2px;
}
.task-body { flex: 1; min-width: 0; }
.task-title-row { display: flex; align-items: center; gap: .4rem; flex-wrap: wrap; }
.energy-dot {
  width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
}
.energy-dot.low { background: var(--energy-low); }
.energy-dot.medium { background: var(--energy-med); }
.energy-dot.high { background: var(--energy-high); }
.task-title { font-size: .95rem; font-weight: 600; line-height: 1.4; word-break: break-word; }
.task-meta { display: flex; flex-wrap: wrap; gap: .3rem; margin-top: .35rem; align-items: center; opacity: .7; }
.task-due {
  font-size: .7rem; font-weight: 500; color: var(--muted);
  background: var(--surface2); padding: .15rem .4rem; border-radius: 6px;
}
.task-due.overdue { color: var(--amber); background: var(--ambersoft); }
.task-due.today { color: var(--accent); background: var(--asoft); font-weight: 600; }
.tag-pill {
  font-size: .62rem; font-weight: 600; padding: .12rem .4rem;
  border-radius: 6px; background: var(--surface2); color: var(--muted);
  white-space: nowrap; opacity: .6;
}
.task-waiting {
  font-size: .72rem; color: var(--amber); margin-top: .3rem;
  display: flex; align-items: center; gap: .3rem;
}
.task-notes-preview {
  font-size: .75rem; color: var(--dim); margin-top: .3rem;
  display: -webkit-box; -webkit-line-clamp: 2; line-clamp: 2;
  -webkit-box-orient: vertical; overflow: hidden;
}
.task-children {
  margin-top: .5rem; padding-top: .4rem;
  border-top: 1px solid var(--border);
}
.task-child {
  display: flex; align-items: center; gap: .4rem;
  padding: .2rem 0; font-size: .78rem;
}
.task-child-check {
  width: 15px; height: 15px; border: 1.5px solid var(--border);
  border-radius: 4px; flex-shrink: 0; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all .15s;
}
.task-child-check:hover { border-color: var(--accent); }
.task-child-check.checked {
  border-color: var(--accent); background: var(--accent);
}
.task-child-check.checked::after {
  content: ''; display: block; width: 5px; height: 8px;
  border: solid #fff; border-width: 0 1.5px 1.5px 0;
  transform: rotate(45deg); margin-top: -1px;
}
.task-child-title.done { text-decoration: line-through; color: var(--dim); }
.child-progress {
  font-size: .68rem; color: var(--dim); font-weight: 500;
  margin-inline-start: auto;
}
.task-age { font-size: .68rem; color: var(--dim); margin-top: .25rem; }
.task-age.stale { color: var(--amber); }
.task-created { font-size: .68rem; color: var(--dim); margin-inline-start: .25rem; }
.task-edited { font-size: .68rem; color: var(--dim); margin-inline-start: .25rem; font-style: italic; }

/* ── Section Headers ── */
.section-hdr {
  font-size: .75rem; font-weight: 700; text-transform: uppercase;
  letter-spacing: .07em; color: var(--muted); padding: .75rem .25rem .35rem;
}
.section-hdr.overdue { color: var(--amber); }

/* ── Collapsible Focus Sections ── */
.section-collapsed .task-card:nth-child(n+7) { display: none; }
.show-more-btn {
  display: block; width: 100%; padding: .5rem; margin: .25rem 0 .75rem;
  background: var(--surface2); border: 1px dashed var(--border);
  border-radius: var(--r); font-size: .78rem; color: var(--muted);
  cursor: pointer; text-align: center; font-weight: 500;
}
.show-more-btn:hover { background: var(--surface3); color: var(--text); }

/* ── Compact Task Cards ── */
.task-card .task-notes-preview,
.task-card .task-age,
.task-card .task-created,
.task-card .task-edited { display: none; }
.task-card.expanded .task-notes-preview,
.task-card.expanded .task-age,
.task-card.expanded .task-created,
.task-card.expanded .task-edited { display: block; }

/* ── Stream Cards ── */
.stream-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--r); padding: .85rem 1rem; margin-bottom: .5rem;
  box-shadow: var(--shadow); cursor: pointer; transition: all .15s;
}
.stream-card:hover { border-color: var(--accent); }
.stream-top { display: flex; align-items: center; justify-content: space-between; }
.stream-name { font-size: .9rem; font-weight: 600; display: flex; align-items: center; gap: .4rem; }
.stream-count { font-size: .75rem; color: var(--muted); }
.stream-stats {
  display: flex; gap: .5rem; margin-top: .4rem; font-size: .7rem; color: var(--dim);
}
.stream-bar {
  height: 4px; background: var(--surface2); border-radius: 2px;
  margin-top: .5rem; overflow: hidden;
}
.stream-bar-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width .3s; }
.stream-tasks { padding-top: .5rem; border-top: 1px solid var(--border); margin-top: .5rem; display: none; }
.stream-card.expanded .stream-tasks { display: block; }
.stream-chevron {
  transition: transform .2s; font-size: .8rem; color: var(--dim);
}
.stream-card.expanded .stream-chevron { transform: rotate(90deg); }

/* ── Empty State ── */
.empty-state {
  text-align: center; padding: 3rem 1rem; color: var(--dim);
}
.empty-state-icon { font-size: 2.5rem; margin-bottom: .75rem; opacity: .5; }
.empty-state-text { font-size: .9rem; }

/* ── Quick Add ── */
.quick-add {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: var(--surface); border-top: 1px solid var(--border);
  padding: .5rem .75rem .6rem; box-shadow: 0 -2px 12px rgba(26,25,21,.1);
  z-index: 200; display: flex; flex-direction: column; gap: .4rem;
}
.quick-add-row1 { display: flex; gap: .5rem; align-items: center; }
.quick-add-dates { display: flex; gap: .3rem; align-items: center; }
.qa-date-btn {
  font-size: .7rem; font-weight: 500; padding: .22rem .5rem;
  border-radius: 6px; border: 1px solid var(--border);
  background: var(--surface2); color: var(--muted); cursor: pointer;
  transition: all .15s; white-space: nowrap;
}
.qa-date-btn:hover { border-color: var(--accent); color: var(--accent); }
.qa-date-btn.active { border-color: var(--accent); color: var(--accent); background: var(--asoft); font-weight: 600; }
.qa-date-pick-wrap input[type="date"] {
  font-size: .7rem; padding: .22rem .5rem; border-radius: 6px;
  border: 1px solid var(--border); background: var(--surface2);
  color: var(--muted); cursor: pointer; outline: none;
  font-family: inherit;
}
.qa-date-pick-wrap input[type="date"].active {
  border-color: var(--accent); color: var(--accent); background: var(--asoft);
}
.quick-add-input {
  flex: 1; padding: .6rem .8rem; border: 1px solid var(--border);
  border-radius: var(--r); font-size: .88rem; background: var(--surface2);
  outline: none; min-width: 0;
}
.quick-add-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--asoft); }
.quick-add-date {
  width: 38px; height: 38px; padding: 0; border: 1px solid var(--border);
  border-radius: var(--r); background: var(--surface2); color: var(--muted);
  font-size: .85rem; display: flex; align-items: center; justify-content: center;
  position: relative; overflow: hidden; flex-shrink: 0;
}
.quick-add-date input[type="date"] {
  position: absolute; inset: 0; opacity: 0; cursor: pointer;
  width: 100%; height: 100%;
}
.quick-add-date.has-date { border-color: var(--accent); color: var(--accent); background: var(--asoft); }
.energy-picker {
  display: flex; gap: .25rem; align-items: center; flex-shrink: 0;
}
.energy-pick {
  width: 24px; height: 24px; border-radius: 50%; border: 2px solid var(--border);
  background: none; display: flex; align-items: center; justify-content: center;
  transition: all .15s; position: relative;
}
.energy-pick::after {
  content: ''; width: 10px; height: 10px; border-radius: 50%;
}
.energy-pick[data-e="low"]::after { background: var(--energy-low); }
.energy-pick[data-e="medium"]::after { background: var(--energy-med); }
.energy-pick[data-e="high"]::after { background: var(--energy-high); }
.energy-pick.active { border-color: var(--text); transform: scale(1.15); }
.quick-add-btn {
  width: 38px; height: 38px; border-radius: 50%; border: none;
  background: var(--accent); color: #fff; font-size: 1.3rem;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; transition: background .15s;
}
.quick-add-btn:hover { background: var(--abright); }
.quick-add-btn:disabled { opacity: .4; cursor: not-allowed; }

/* ── Modal ── */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(26,25,21,.45);
  z-index: 500; display: flex; align-items: flex-end;
  justify-content: center; opacity: 0; pointer-events: none;
  transition: opacity .2s;
}
.modal-overlay.visible { opacity: 1; pointer-events: auto; }
.modal {
  background: var(--surface); border-radius: var(--rl) var(--rl) 0 0;
  width: 100%; max-width: 550px; max-height: 90vh; overflow-y: auto;
  transform: translateY(100%); transition: transform .25s ease-out;
  padding: 1.25rem; box-shadow: var(--shadowlg);
}
.modal-overlay.visible .modal { transform: translateY(0); }
@media (min-width: 601px) {
  .modal-overlay { align-items: center; }
  .modal { border-radius: var(--rl); transform: scale(.95) translateY(20px); }
  .modal-overlay.visible .modal { transform: scale(1) translateY(0); }
}
.modal-handle {
  width: 40px; height: 4px; background: var(--border); border-radius: 2px;
  margin: 0 auto .75rem;
}
.modal-title { font-size: 1rem; font-weight: 700; margin-bottom: 1rem; }
.modal-field { margin-bottom: .85rem; }
.modal-label {
  font-size: .68rem; font-weight: 700; text-transform: uppercase;
  letter-spacing: .06em; color: var(--muted); margin-bottom: .3rem;
}
.modal-input {
  width: 100%; padding: .6rem .75rem; border: 1px solid var(--border);
  border-radius: var(--r); font-size: .88rem; background: var(--surface2);
  outline: none;
}
.modal-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--asoft); }
.modal-textarea {
  width: 100%; padding: .6rem .75rem; border: 1px solid var(--border);
  border-radius: var(--r); font-size: .85rem; background: var(--surface2);
  outline: none; resize: vertical; min-height: 80px;
}
.modal-textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--asoft); }
.modal-select {
  width: 100%; padding: .55rem .75rem; border: 1px solid var(--border);
  border-radius: var(--r); font-size: .85rem; background: var(--surface2);
  outline: none; cursor: pointer;
}
.modal-select:focus { border-color: var(--accent); }
.modal-row { display: flex; gap: .75rem; }
.modal-row > .modal-field { flex: 1; }
.modal-tags { display: flex; flex-wrap: wrap; gap: .3rem; }
.modal-tag {
  font-size: .72rem; font-weight: 500; padding: .25rem .55rem;
  border-radius: 8px; border: 1px solid var(--border); background: var(--surface2);
  color: var(--muted); cursor: pointer; transition: all .15s;
}
.modal-tag:hover { border-color: var(--accent); }
.modal-tag.active {
  background: var(--asoft); color: var(--accent);
  border-color: var(--accent); font-weight: 600;
}
.modal-energy-row { display: flex; gap: .5rem; }
.modal-energy-btn {
  flex: 1; padding: .5rem; border: 1px solid var(--border);
  border-radius: var(--r); background: var(--surface2);
  font-size: .78rem; font-weight: 500; color: var(--muted);
  display: flex; align-items: center; justify-content: center; gap: .3rem;
  transition: all .15s;
}
.modal-energy-btn:hover { border-color: var(--text); }
.modal-energy-btn.active { font-weight: 600; }
.modal-energy-btn[data-e="low"].active { border-color: var(--energy-low); color: var(--energy-low); background: var(--gsoft); }
.modal-energy-btn[data-e="medium"].active { border-color: var(--energy-med); color: var(--energy-med); background: var(--ambersoft); }
.modal-energy-btn[data-e="high"].active { border-color: var(--energy-high); color: var(--energy-high); background: var(--rsoft); }
.modal-actions { display: flex; gap: .5rem; margin-top: 1.25rem; }
.modal-save {
  flex: 1; padding: .65rem; background: var(--accent); color: #fff;
  border: none; border-radius: var(--r); font-size: .88rem; font-weight: 600;
}
.modal-save:hover { background: var(--abright); }
.modal-complete {
  padding: .65rem 1rem; background: none; color: var(--accent);
  border: 1px solid var(--asoft); border-radius: var(--r);
  font-size: .85rem; font-weight: 500;
}
.modal-complete:hover { background: var(--asoft); }
.modal-cancel {
  padding: .65rem 1rem; background: none; color: var(--muted);
  border: 1px solid var(--border); border-radius: var(--r);
  font-size: .85rem;
}
.modal-delete {
  padding: .65rem .8rem; background: none; color: var(--red);
  border: 1px solid var(--rsoft); border-radius: var(--r);
  font-size: 1rem;
}
.modal-delete:hover { background: var(--rsoft); }

/* ── Search / Filter ── */
.search-bar {
  position: relative; margin-bottom: .75rem;
}
.search-input {
  width: 100%; padding: .6rem 2rem .6rem 2.2rem;
  border: 1px solid var(--border); border-radius: var(--r);
  font-size: .85rem; background: var(--surface); outline: none;
}
.search-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--asoft); }
.search-icon {
  position: absolute; top: 50%; left: .75rem; transform: translateY(-50%);
  color: var(--dim); font-size: .85rem; pointer-events: none;
}
.search-clear {
  position: absolute; top: 50%; right: .6rem; transform: translateY(-50%);
  background: var(--surface3); border: none; border-radius: 50%; width: 20px; height: 20px;
  font-size: .7rem; color: var(--muted); cursor: pointer; display: flex;
  align-items: center; justify-content: center; line-height: 1;
}
.search-clear:hover { background: var(--border); color: var(--text); }
mark.search-hl { background: #fef08a; color: inherit; border-radius: 2px; padding: 0 1px; }
.filter-row { display: flex; flex-wrap: wrap; gap: .3rem; margin-bottom: .75rem; }
.filter-chip {
  font-size: .7rem; font-weight: 500; padding: .25rem .55rem;
  border-radius: 8px; border: 1px solid var(--border);
  background: var(--surface); color: var(--muted); cursor: pointer;
  transition: all .15s;
}
@media (hover: hover) and (pointer: fine) { .filter-chip:hover { border-color: var(--accent); } }
.filter-chip.active {
  background: var(--asoft); color: var(--accent);
  border-color: var(--accent); font-weight: 600;
}

/* ── Loading ── */
.loading { text-align: center; padding: 3rem 1rem; color: var(--dim); }
.spinner {
  width: 28px; height: 28px; border: 3px solid var(--border);
  border-top-color: var(--accent); border-radius: 50%;
  animation: spin .7s linear infinite; margin: 0 auto .75rem;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Activate Button ── */
.activate-btn {
  font-size: .72rem; font-weight: 500; padding: .3rem .6rem;
  border-radius: 6px; border: 1px solid var(--accent);
  background: var(--asoft); color: var(--accent); cursor: pointer;
  margin-inline-start: auto; flex-shrink: 0;
}
.activate-btn:hover { background: var(--accent); color: #fff; }

/* ── Confirm Dialog ── */
.confirm-dialog {
  position: fixed; inset: 0; background: rgba(26,25,21,.5);
  z-index: 600; display: flex; align-items: center; justify-content: center;
  padding: 1rem; opacity: 0; pointer-events: none; transition: opacity .15s;
}
.confirm-dialog.visible { opacity: 1; pointer-events: auto; }
.confirm-box {
  background: var(--surface); border-radius: var(--rl);
  padding: 1.5rem; max-width: 340px; width: 100%;
  box-shadow: var(--shadowlg); text-align: center;
}
.confirm-text { font-size: .9rem; margin-bottom: 1.25rem; line-height: 1.5; }
.confirm-actions { display: flex; gap: .5rem; }
.confirm-yes {
  flex: 1; padding: .6rem; background: var(--red); color: #fff;
  border: none; border-radius: var(--r); font-size: .85rem; font-weight: 600;
}
.confirm-no {
  flex: 1; padding: .6rem; background: var(--surface2); color: var(--text);
  border: 1px solid var(--border); border-radius: var(--r); font-size: .85rem;
}

/* ── Toast ── */
.toast {
  position: fixed; bottom: 5rem; left: 50%; transform: translateX(-50%);
  background: var(--text); color: #fff; padding: .6rem 1.2rem;
  border-radius: var(--r); font-size: .82rem; font-weight: 500;
  z-index: 700; opacity: 0; transition: opacity .2s;
  pointer-events: none; white-space: nowrap;
  display: flex; align-items: center; gap: .75rem;
}
.toast.visible { opacity: 1; }
.toast.has-undo { pointer-events: auto; }
.toast-undo-btn {
  background: none; border: 1px solid rgba(255,255,255,.5); color: #fff;
  padding: .2rem .6rem; border-radius: 4px; font-size: .78rem;
  cursor: pointer; font-family: inherit; font-weight: 600;
}
.toast-undo-btn:hover { background: rgba(255,255,255,.15); }

/* ── Day Navigation ── */
.day-nav {
  display: flex; align-items: center; justify-content: center;
  gap: .5rem; padding: .6rem .5rem .3rem; position: relative; margin-bottom: 1rem;
}
.day-nav-arrow {
  width: 36px; height: 36px; border-radius: 50%; border: 1px solid var(--border);
  background: var(--surface); color: var(--muted); font-size: 1.1rem;
  display: flex; align-items: center; justify-content: center;
  transition: all .15s; flex-shrink: 0;
}
.day-nav-arrow:hover { background: var(--surface2); color: var(--text); border-color: var(--accent); }
.day-nav-center { text-align: center; position: relative; cursor: pointer; }
.day-nav-date {
  font-size: 1.05rem; font-weight: 700; color: var(--text); line-height: 1.2;
}
.day-nav-sub {
  font-size: .68rem; color: var(--dim); font-weight: 500;
}
.day-nav-center input[type="date"] {
  position: absolute; inset: 0; opacity: 0; cursor: pointer;
  width: 100%; height: 100%;
}
.day-nav-today {
  font-size: .68rem; font-weight: 600; padding: .2rem .55rem;
  border-radius: 6px; border: 1px solid var(--accent); background: var(--asoft);
  color: var(--accent); transition: all .15s; flex-shrink: 0;
}
.day-nav-today:hover { background: var(--accent); color: #fff; }
.day-nav-today.hidden { visibility: hidden; pointer-events: none; }
.day-nav-add {
  width: 36px; height: 36px; border-radius: 50%; border: none;
  background: var(--accent); color: #fff; font-size: 1.3rem;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; transition: all .15s; box-shadow: var(--shadow);
}
.day-nav-add:hover { background: var(--abright); transform: scale(1.05); }

/* ── Week Overview ── */
.week-overview {
  display: flex; justify-content: center; gap: .35rem;
  padding: .25rem .5rem .5rem; direction: ltr;
}
.week-dot {
  display: flex; flex-direction: column; align-items: center;
  gap: .15rem; cursor: pointer; padding: .2rem .35rem;
  border-radius: 8px; transition: all .15s; min-width: 36px;
}
.week-dot:hover { background: var(--surface2); }
.week-dot.active { background: var(--asoft); }
.week-dot-label {
  font-size: .58rem; font-weight: 600; text-transform: uppercase;
  color: var(--dim); letter-spacing: .03em;
}
.week-dot.active .week-dot-label { color: var(--accent); }
.week-dot.today .week-dot-label { color: var(--accent); font-weight: 700; }
.week-dot-bar {
  width: 22px; height: 4px; border-radius: 2px;
  background: var(--surface3); transition: all .15s;
}
.week-dot.has-blocks .week-dot-bar { background: var(--accent); }
.week-dot.active .week-dot-bar { background: var(--accent); }
.week-dot-count {
  font-family: 'DM Mono', monospace; font-size: .58rem;
  color: var(--dim); font-weight: 500;
}
.week-dot.active .week-dot-count { color: var(--accent); }

/* ── Day Visualizer ── */
.day-view { padding-bottom: 1rem; }
.day-section-label {
  font-size: .68rem; font-weight: 700; text-transform: uppercase;
  letter-spacing: .07em; color: var(--muted); padding: .5rem .25rem .35rem;
}
.day-timeline {
  position: relative; background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--r); overflow: hidden; min-height: 200px;
}
.day-hour-row {
  display: flex; align-items: flex-start; min-height: 60px;
  border-bottom: 1px solid var(--surface2); position: relative;
}
.day-hour-row:last-child { border-bottom: none; }
.day-hour-label {
  width: 52px; flex-shrink: 0; font-family: 'DM Mono', monospace;
  font-size: .7rem; color: var(--dim); padding: .35rem .5rem 0 .5rem;
  text-align: left; direction: ltr;
}
.day-hour-track {
  flex: 1; position: relative; min-height: 60px;
}
.day-block {
  position: absolute; left: 4px; right: 4px;
  background: var(--asoft); border: 1px solid rgba(45,106,79,.25);
  border-radius: 8px; padding: .45rem .6rem; z-index: 2;
  cursor: pointer; transition: box-shadow .15s;
  border-inline-start: 3px solid var(--accent);
  overflow: hidden;
}
.day-block:hover { box-shadow: 0 2px 8px rgba(45,106,79,.18); }
.day-block-title {
  font-size: .82rem; font-weight: 600; color: var(--text);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.day-block-time {
  font-family: 'DM Mono', monospace; font-size: .68rem;
  color: var(--accent); font-weight: 500; direction: ltr;
  display: inline-block;
}
.day-block-tags {
  display: flex; gap: .2rem; margin-top: .15rem; flex-wrap: wrap;
}
.day-block-tags .tag-pill { font-size: .58rem; }
.day-now-line {
  position: absolute; left: 52px; right: 0; height: 2px;
  background: var(--red); z-index: 10; pointer-events: none;
}
.day-now-dot {
  position: absolute; right: -5px; top: -4px; width: 10px; height: 10px;
  background: var(--red); border-radius: 50%;
}
.day-now-label {
  position: absolute; left: -50px; top: -7px; font-size: .62rem;
  font-family: 'DM Mono', monospace; color: var(--red); font-weight: 600;
  width: 48px; text-align: center; direction: ltr;
}
.day-flexible { margin-top: .75rem; }
.day-flexible-header {
  display: flex; align-items: center; gap: .5rem; padding: .5rem .25rem .35rem;
}
.day-flexible-label {
  font-size: .68rem; font-weight: 700; text-transform: uppercase;
  letter-spacing: .07em; color: var(--muted);
}
.day-flexible-count {
  font-size: .62rem; font-weight: 600; background: var(--surface2);
  padding: .1rem .35rem; border-radius: 8px; color: var(--dim);
}
.day-timed-badge {
  font-family: 'DM Mono', monospace; font-size: .68rem;
  color: var(--accent); background: var(--asoft);
  padding: .1rem .4rem; border-radius: 6px; font-weight: 500;
  direction: ltr; display: inline-block;
}
.day-empty {
  text-align: center; padding: 2rem 1rem; color: var(--dim);
  font-size: .85rem;
}
.day-summary {
  display: flex; gap: .5rem; flex-wrap: wrap; margin-bottom: .75rem;
}
.day-summary-chip {
  font-size: .72rem; font-weight: 500; padding: .3rem .65rem;
  border-radius: 8px; background: var(--surface); border: 1px solid var(--border);
  color: var(--muted); display: flex; align-items: center; gap: .3rem;
}
.day-summary-chip .num {
  font-family: 'DM Mono', monospace; font-weight: 700; color: var(--text);
}

/* ── Recurring Blocks ── */
.day-block.recurring {
  background: repeating-linear-gradient(
    -45deg,
    rgba(45,106,79,.06),
    rgba(45,106,79,.06) 4px,
    rgba(45,106,79,.12) 4px,
    rgba(45,106,79,.12) 8px
  );
  border: 1px dashed rgba(45,106,79,.35);
  border-inline-start: 3px dashed var(--accent);
  cursor: default;
}
.day-block.recurring:hover { box-shadow: none; }
.day-block.recurring .day-block-title { color: var(--accent); }
.recurring-icon {
  font-size: .68rem; margin-inline-end: .25rem; opacity: .7;
}

/* ── Add Block Modal ── */
.add-block-modal {
  position: fixed; inset: 0; background: rgba(26,25,21,.45);
  z-index: 500; display: flex; align-items: flex-end;
  justify-content: center; opacity: 0; pointer-events: none;
  transition: opacity .2s;
}
.add-block-modal.visible { opacity: 1; pointer-events: auto; }
.add-block-form {
  background: var(--surface); border-radius: var(--rl) var(--rl) 0 0;
  width: 100%; max-width: 550px; max-height: 90vh; overflow-y: auto;
  transform: translateY(100%); transition: transform .25s ease-out;
  padding: 1.25rem; box-shadow: var(--shadowlg);
}
.add-block-modal.visible .add-block-form { transform: translateY(0); }
@media (min-width: 601px) {
  .add-block-modal { align-items: center; }
  .add-block-form { border-radius: var(--rl); transform: scale(.95) translateY(20px); }
  .add-block-modal.visible .add-block-form { transform: scale(1) translateY(0); }
}
.add-block-time-row {
  display: flex; gap: .5rem; align-items: center;
}
.add-block-time-row input[type="time"] {
  flex: 1; padding: .6rem .75rem; border: 1px solid var(--border);
  border-radius: var(--r); font-size: .88rem; background: var(--surface2);
  outline: none; font-family: 'DM Mono', monospace;
}
.add-block-time-row input[type="time"]:focus {
  border-color: var(--accent); box-shadow: 0 0 0 3px var(--asoft);
}
.add-block-time-sep {
  font-size: .85rem; color: var(--dim); font-weight: 500;
}

/* ── Scrollbar ── */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--dim); }

/* ── Events Tab ── */
.event-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--r); padding: .75rem .85rem; margin-bottom: .5rem;
  box-shadow: var(--shadow); border-inline-start: 3px solid #7c3aed;
}
.event-title { font-size: .9rem; font-weight: 600; }
.event-meta { font-size: .72rem; color: var(--muted); margin-top: .25rem; display: flex; gap: .5rem; flex-wrap: wrap; }
.event-date { color: #7c3aed; font-weight: 500; }
.event-with { color: var(--dim); }
.event-delete {
  float: right; background: none; border: none; color: var(--dim);
  font-size: .85rem; cursor: pointer; padding: .1rem .3rem; border-radius: 4px;
}
.event-delete:hover { color: var(--red); background: var(--rsoft); }
.day-block.event-block {
  background: rgba(124,58,237,.10);
  border: 1px solid rgba(124,58,237,.25);
  border-inline-start: 3px solid #7c3aed;
}
.day-block.event-block .day-block-title { color: #7c3aed; }
.day-block.event-block .day-block-time { color: #7c3aed; }

/* ── Recurring Tab ── */
.recurring-item {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--r); padding: .75rem .85rem; margin-bottom: .5rem;
  box-shadow: var(--shadow); display: flex; align-items: center; gap: .75rem;
}
.recurring-status-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
.recurring-body { flex: 1; min-width: 0; }
.recurring-title { font-size: .88rem; font-weight: 600; }
.recurring-meta { font-size: .72rem; color: var(--muted); margin-top: .2rem; }
.recurring-due { font-size: .72rem; font-weight: 600; margin-top: .2rem; }
.recurring-done-btn {
  font-size: .72rem; font-weight: 600; padding: .3rem .65rem;
  border-radius: 6px; border: 1px solid var(--accent);
  background: var(--asoft); color: var(--accent); cursor: pointer;
  flex-shrink: 0; transition: all .15s;
}
.recurring-done-btn:hover { background: var(--accent); color: #fff; }
.recurring-delete-btn {
  font-size: .8rem; padding: .25rem .4rem; border-radius: 6px;
  border: 1px solid var(--border); background: none; color: var(--dim);
  cursor: pointer; flex-shrink: 0;
}
.recurring-delete-btn:hover { color: var(--red); border-color: var(--rsoft); background: var(--rsoft); }

/* ── Week Tab ── */
.week-view-tab { padding-bottom: 1rem; }
.week-col-header {
  font-size: .68rem; font-weight: 700; text-transform: uppercase;
  letter-spacing: .06em; color: var(--muted); padding: .5rem .25rem .35rem;
  display: flex; align-items: center; gap: .4rem;
}
.week-col-header.today-col { color: var(--accent); }
.week-col-date { font-family: 'DM Mono', monospace; font-size: .7rem; }
.week-day-section { margin-bottom: .75rem; }
.week-task-row {
  display: flex; align-items: center; gap: .5rem; padding: .3rem .5rem;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 8px; margin-bottom: .25rem; cursor: pointer; transition: all .15s;
}
.week-task-row:hover { border-color: var(--accent); }
.week-floating-section {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--r); padding: .75rem; margin-top: .5rem;
}
.week-floating-label {
  font-size: .68rem; font-weight: 700; text-transform: uppercase;
  letter-spacing: .07em; color: var(--muted); margin-bottom: .5rem;
}

/* ── Add Form (shared for Events, Recurring) ── */
.add-form-section {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--r); padding: .85rem; margin-top: .75rem;
  box-shadow: var(--shadow);
}
.add-form-title {
  font-size: .72rem; font-weight: 700; text-transform: uppercase;
  letter-spacing: .06em; color: var(--muted); margin-bottom: .65rem;
}
.add-form-row { display: flex; gap: .5rem; flex-wrap: wrap; margin-bottom: .5rem; }
.add-form-row input, .add-form-row select {
  flex: 1; min-width: 100px; padding: .5rem .65rem;
  border: 1px solid var(--border); border-radius: var(--r);
  font-size: .82rem; background: var(--surface2);
  outline: none; font-family: inherit;
}
.add-form-row input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--asoft); }
.add-form-btn {
  padding: .5rem 1rem; background: var(--accent); color: #fff;
  border: none; border-radius: var(--r); font-size: .82rem;
  font-weight: 600; cursor: pointer; transition: background .15s;
}
.add-form-btn:hover { background: var(--abright); }

/* ── Dashboards ── */
.dash-subnav {
  display: flex; overflow-x: auto; scrollbar-width: none;
  gap: .3rem; padding: .5rem 0 .75rem; -webkit-overflow-scrolling: touch;
}
.dash-subnav::-webkit-scrollbar { display: none; }
.dash-pill {
  flex-shrink: 0; padding: .35rem .75rem; border-radius: 20px;
  border: 1px solid var(--border); background: var(--surface);
  font-size: .75rem; font-weight: 500; color: var(--muted);
  cursor: pointer; white-space: nowrap; transition: all .15s;
}
.dash-pill:hover { border-color: var(--accent); color: var(--text); }
.dash-pill.active {
  background: var(--accent); color: #fff; border-color: var(--accent); font-weight: 600;
}
.dash-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--r); padding: .85rem 1rem; margin-bottom: .6rem;
  box-shadow: var(--shadow);
}
.dash-card-title {
  font-size: .72rem; font-weight: 700; text-transform: uppercase;
  letter-spacing: .06em; color: var(--muted); margin-bottom: .6rem;
}
.dash-stat-row {
  display: flex; gap: .4rem; flex-wrap: wrap; margin-bottom: .6rem;
}
.dash-stat {
  flex: 1; min-width: 60px; background: var(--surface2); border-radius: 8px;
  padding: .4rem .6rem; text-align: center;
}
.dash-stat-num {
  font-family: 'DM Mono', monospace; font-size: 1.1rem; font-weight: 700;
  line-height: 1.2;
}
.dash-stat-lbl {
  font-size: .58rem; font-weight: 600; text-transform: uppercase;
  letter-spacing: .05em; color: var(--muted); line-height: 1.3;
}
.dash-stat-num.red { color: var(--red); }
.dash-stat-num.amber { color: var(--amber); }
.dash-stat-num.green { color: var(--green); }
.dash-week-row {
  display: flex; align-items: center; gap: .5rem; padding: .45rem .5rem;
  border-radius: 8px; cursor: pointer; transition: background .12s;
  border-bottom: 1px solid var(--surface2);
}
.dash-week-row:last-child { border-bottom: none; }
.dash-week-row:hover { background: var(--surface2); }
.dash-week-row.overloaded { background: var(--ambersoft); }
.dash-week-row.empty-day { opacity: .55; }
.dash-week-day {
  width: 32px; font-size: .78rem; font-weight: 700; flex-shrink: 0;
}
.dash-week-day.today { color: var(--accent); }
.dash-week-count {
  font-family: 'DM Mono', monospace; font-size: .8rem; font-weight: 600;
  width: 22px; text-align: right; flex-shrink: 0;
}
.dash-week-dots {
  display: flex; gap: 3px; align-items: center; flex: 1;
}
.dash-week-chevron {
  font-size: .7rem; color: var(--dim); transition: transform .15s; flex-shrink: 0;
}
.dash-week-row.expanded .dash-week-chevron { transform: rotate(90deg); }
.dash-week-tasks {
  display: none; padding: .4rem .5rem .2rem 52px;
  background: var(--surface2); border-radius: 0 0 8px 8px;
  border-bottom: 1px solid var(--border);
}
.dash-week-row.expanded + .dash-week-tasks { display: block; }
.dash-inline-task {
  font-size: .78rem; padding: .2rem 0; color: var(--text);
  display: flex; align-items: center; gap: .4rem; border-bottom: 1px solid var(--border);
}
.dash-inline-task:last-child { border-bottom: none; }
.dash-progress-bar {
  height: 6px; background: var(--surface2); border-radius: 3px;
  overflow: hidden; margin-top: .4rem;
}
.dash-progress-fill {
  height: 100%; border-radius: 3px; transition: width .3s;
}
.dash-progress-fill.green { background: var(--green); }
.dash-progress-fill.amber { background: var(--amber); }
.dash-progress-fill.red { background: var(--red); }
.dash-badge {

function matchesSearch(task, query) {
  if (!query) return true;
  const words = query.toLowerCase().split(/\s+/).filter(Boolean);
  const text = [task.title || '', task.notes || '', ...(task.tags || [])].join(' ').toLowerCase();
  return words.every(w => text.includes(w));
}

function highlightSearch(text) {
  const q = allFilters.search || focusSearch || globalSearch;
  if (!q || !text) return esc(text);
  const escaped = esc(text);
  const words = q.toLowerCase().split(/s+/).filter(Boolean);
  let result = escaped;
  words.forEach(w => {
    const re = new RegExp('(' + w.replace(/[.*+?^${}()|[]\]/g, '\function buildSearchBar(') + ')', 'gi');
    result = result.replace(re, '<mark class="search-hl">$1</mark>');
  });
  return result;
}

function buildSearchBar(varName, placeholder) {
  const val = varName === 'allFilters.search' ? allFilters.search : varName === 'focusSearch' ? focusSearch : globalSearch;

    <span class="search-icon">&#x1F50D;</span>
    <input type="text" class="search-input" data-search-var="${varName}" placeholder="${placeholder}" value="${esc(val)}">
    ${val ? `<button class="search-clear" onclick="${varName}='';renderCurrentTab();">&times;</button>` : ''}
  </div>`;
}

let _searchTimer = null;
function wireSearchInput(container, varName) {
  const el = container.querySelector('.search-input[data-search-var="' + varName + '"]');
  if (!el) return;
  const val = varName === 'allFilters.search' ? allFilters.search : varName === 'focusSearch' ? focusSearch : globalSearch;
  if (val) { el.focus(); const len = el.value.length; el.setSelectionRange(len, len); }
  el.addEventListener('input', function() {
    const v = this.value;
    if (varName === 'allFilters.search') allFilters.search = v;
    else if (varName === 'focusSearch') focusSearch = v;
    else globalSearch = v;
    clearTimeout(_searchTimer);
    _searchTimer = setTimeout(renderCurrentTab, 150);
  });
  el.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') {
      if (varName === 'allFilters.search') allFilters.search = '';
      else if (varName === 'focusSearch') focusSearch = '';
      else globalSearch = '';
      clearTimeout(_searchTimer);
      renderCurrentTab();
    }
  });
}

// ─── Date Helpers ───
function localDateStr(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}
function today() { return localDateStr(new Date()); }
function tomorrow() {
  const d = new Date(); d.setDate(d.getDate() + 1);
  return localDateStr(d);
}
function daysAgo(dateStr) {
  const d = new Date(dateStr);
  const now = new Date(); now.setHours(0,0,0,0); d.setHours(0,0,0,0);
  return Math.floor((now - d) / 86400000);
}
function formatDate(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr + 'T00:00:00');
  const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `${days[d.getDay()]} ${months[d.getMonth()]} ${d.getDate()}`;
}
function formatDateLong(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr + 'T00:00:00');
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `${months[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()}`;
}
function timeAgo(isoStr) {
  if (!isoStr) return '';
  const diff = Date.now() - new Date(isoStr).getTime();
  const mins = Math.floor(diff / 60000);
  if (mins < 1) return 'just now';
  if (mins < 60) return `${mins}m ago`;
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return `${hrs}h ago`;
  const days = Math.floor(hrs / 24);
  if (days === 1) return 'yesterday';
  if (days < 7) return `${days}d ago`;
  const weeks = Math.floor(days / 7);
  if (weeks < 4) return `${weeks}w ago`;
  return formatDate(isoStr.slice(0, 10));
}
function isOverdue(t) { return t.due_date && t.due_date < today() && t.status !== 'done'; }
function isToday(t) { return t.due_date === today(); }
function isTomorrow(t) { return t.due_date === tomorrow(); }
function daysFromToday(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  const t = new Date(today() + 'T00:00:00');
  const diff = Math.round((d - t) / 86400000);
  if (diff === 0) return 'Today';
  if (diff === 1) return 'Tomorrow';
  if (diff === -1) return 'Yesterday';
  if (diff > 0) return `In ${diff} days`;
  return `${Math.abs(diff)} days ago`;
}

// ─── Data ───
function loadCached() {
  try {
    const c = localStorage.getItem('tasks_cache');
    if (c) { tasks = JSON.parse(c); renderCurrentTab(); }
    const t = localStorage.getItem('tags_cache');
    if (t) { tagDefs = JSON.parse(t); }
  } catch(e) {}
}

async function refreshData() {
  try {
    const [tasksRes, tagsRes] = await Promise.all([
      sb.from('tasks').select('*').order('sort_order', { ascending: true, nullsFirst: false }),
      sb.from('tag_definitions').select('*')
    ]);
    if (tasksRes.error) throw tasksRes.error;
    if (tagsRes.error) throw tagsRes.error;
    tasks = (tasksRes.data || []).map(t => t.status === 'todo' ? { ...t, status: 'open' } : t);
    tagDefs = tagsRes.data || [];
    localStorage.setItem('tasks_cache', JSON.stringify(tasks));
    localStorage.setItem('tags_cache', JSON.stringify(tagDefs));
  } catch (e) {
    console.error('Refresh error:', e);
    showToast('Error loading tasks');
  }
  renderRibbon();
  renderCurrentTab();
}

// ─── Ribbon ───
function renderRibbon() {
  const openCount = tasks.filter(t => t.status === 'open' || t.status === 'in_progress').length;
  const waitCount = tasks.filter(t => t.status === 'waiting').length;
  const decideCount = tasks.filter(t => t.status === 'decide' || t.status === 'maybe').length;
  const overdueCount = tasks.filter(t => isOverdue(t)).length;
  const floatCount = tasks.filter(t => !t.due_date && t.status === 'open').length;
  const sevenDaysAgo = new Date(); sevenDaysAgo.setDate(sevenDaysAgo.getDate() - 7);
  const doneWeek = tasks.filter(t => t.status === 'done' && t.completed_at && new Date(t.completed_at) >= sevenDaysAgo).length;

  const stats = [
    { label: 'Open', val: openCount, cls: '', action: () => switchTab('all') },
    { label: 'Waiting', val: waitCount, cls: '', action: () => { switchTab('focus'); } },
    { label: 'Decisions', val: decideCount, cls: decideCount > 0 ? 'blue' : '', action: () => switchTab('focus') },
    { label: 'Need Attention', val: overdueCount, cls: overdueCount > 0 ? 'amber' : '', action: () => switchTab('focus') },
    { label: 'Floating', val: floatCount, cls: '', action: () => { switchTab('all'); allFilters.noDate = true; setTimeout(renderCurrentTab, 0); } },
    { label: 'Done (7d)', val: doneWeek, cls: '', action: () => switchTab('done') },
  ];
  window._ribbonActions = stats.map(s => s.action);

  document.getElementById('ribbonGrid').innerHTML = stats.map((s, i) =>
    `<div class="ribbon-stat" onclick="ribbonStatClick(${i})" title="Click to view">
      <div class="ribbon-label">${s.label}</div>
      <div class="ribbon-val ${s.cls}">${s.val}</div>
    </div>`
  ).join('');

  // Update ribbon summary for mobile collapsed state
  const todayCount = tasks.filter(t => t.due_date === today() && t.status !== 'done' && t.status !== 'backlog').length;
  const summaryEl = document.getElementById('ribbonSummary');
  if (summaryEl) {
    let parts = [];
    if (todayCount > 0) parts.push(`${todayCount} today`);
    if (overdueCount > 0) parts.push(`${overdueCount} overdue`);
    if (waitCount > 0) parts.push(`${waitCount} waiting`);
    summaryEl.textContent = parts.length ? parts.join(' · ') : `${openCount} open`;
  }

  // Collapse ribbon by default on mobile
  const ribbon = document.getElementById('ribbon');
  if (window.innerWidth <= 600 && !ribbon.dataset.userExpanded) {
    ribbon.classList.add('collapsed');
  }
}

function ribbonStatClick(i) {
  if (window._ribbonActions && window._ribbonActions[i]) window._ribbonActions[i]();
}

// ─── Tab Bar ───
function renderTabBar() {
  const bar = document.getElementById('tabBar');
  const mainTabs = TABS.slice(0, 5);
  const moreTabs = TABS.slice(5);
  const moreActive = moreTabs.some(t => t.id === currentTab);

  ).join('');

      ${moreTabs.map(t =>

function toggleTabMore(e) {

function closeTabMore() {

}
document.addEventListener('click', closeTabMore);

function switchTab(id) {
  currentTab = id;
  allFilters = { search: '', tags: [], energy: null, status: null, noDate: false };
  focusSearch = '';
  globalSearch = '';
  if (id !== 'day' && dayNowTimer) { clearInterval(dayNowTimer); dayNowTimer = null; }
  if (id === 'day') viewingDate = today();
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === id));
  const qa = document.getElementById('quickAdd');
  if (qa) qa.style.display = (id === 'events' || id === 'recurring') ? 'none' : '';
  renderCurrentTab();
}

function updateTabCounts() {
  const focusCount = tasks.filter(t => {
    if (t.status === 'done' || t.status === 'backlog') return false;
    return isToday(t) || isOverdue(t) || isTomorrow(t) || t.status === 'waiting' || t.status === 'decide' || (!t.due_date && t.status === 'open');
  }).length;
  const eventsData = getEventsData();
  const recurringData = getRecurringData();
  const overdueRecurring = recurringData.filter(r => getDaysUntilDue(r) <= 0).length;
  const counts = {
    day: tasks.filter(t => t.due_date === viewingDate && t.status !== 'done' && t.status !== 'backlog').length + getRecurringForDate(viewingDate).length,
    focus: focusCount,
    all: tasks.filter(t => t.status !== 'done' && t.status !== 'backlog').length,
    streams: '',
    week: (() => { const wk=[]; for(let i=0;i<7;i++){const d=new Date();d.setDate(d.getDate()+i);wk.push(localDateStr(d));} return tasks.filter(t=>t.status!=='done'&&t.status!=='backlog'&&wk.includes(t.due_date)).length; })() || '',
    events: eventsData.filter(e => e.date >= today()).length || '',
    recurring: overdueRecurring || '',
    done: (() => { const a=new Date();a.setDate(a.getDate()-30);return tasks.filter(t=>t.status==='done'&&t.completed_at&&new Date(t.completed_at)>=a).length; })(),
    dashboards: '',
  };
  TABS.forEach(t => {
    const el = document.getElementById(`tabCount_${t.id}`);
    if (!el) return;
    if (t.id === 'all') {
      const allFilterActive = allFilters.search || allFilters.tags.length || allFilters.energy || allFilters.status || allFilters.noDate;
      el.textContent = allFilterActive ? counts[t.id] : '';
    } else {
      el.textContent = counts[t.id] !== '' && counts[t.id] > 0 ? counts[t.id] : '';
    }
  });
}

// ─── Render Router ───
function renderCurrentTab() {
  updateTabCounts();
  renderRibbon();
  const mc = document.getElementById('mainContent');
  switch (currentTab) {
    case 'day':        renderDay(mc); break;
    case 'focus':      renderFocus(mc); break;
    case 'all':        renderAll(mc); break;
    case 'streams':    renderStreams(mc); break;
    case 'week':       renderWeekTab(mc); break;
    case 'events':     renderEvents(mc); break;
    case 'recurring':  renderRecurring(mc); break;
