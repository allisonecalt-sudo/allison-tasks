name: CI — Build + Lint + Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-lint:
    name: Build & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: ESLint
        run: npm run lint

      - name: Prettier
        run: npm run format

      - name: Upload build
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build-and-lint
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4

  test:
    name: Playwright Tests
    runs-on: ubuntu-latest
    needs: deploy
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run tests
        run: npx playwright test --reporter=list
        env:
          TASK_APP_EMAIL: ${{ secrets.TASK_APP_EMAIL }}
          TASK_APP_PASSWORD: ${{ secrets.TASK_APP_PASSWORD }}

      - name: Clean up test data (always)
        if: always()
        env:
          SB_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          SB_URL="https://hpiyvnfhoqnnnotrmwaz.supabase.co/rest/v1"
          # Find all test tasks
          TASKS=$(curl -s "$SB_URL/tasks?select=id&or=(title.like.PW_SUB_*,title.like.NOSOLO_*)" \
            -H "apikey: $SB_KEY" -H "Authorization: Bearer $SB_KEY")
          PARENT_IDS=$(echo "$TASKS" | python3 -c "import json,sys; print(','.join(t['id'] for t in json.load(sys.stdin)))" || echo "")
          if [ -z "$PARENT_IDS" ]; then
            echo "No test tasks to clean up"
            exit 0
          fi
          # Get child IDs
          CHILDREN=$(curl -s "$SB_URL/tasks?select=id&parent_id=in.($PARENT_IDS)" \
            -H "apikey: $SB_KEY" -H "Authorization: Bearer $SB_KEY")
          CHILD_IDS=$(echo "$CHILDREN" | python3 -c "import json,sys; print(','.join(t['id'] for t in json.load(sys.stdin)))" || echo "")
          ALL_IDS="$PARENT_IDS"
          if [ -n "$CHILD_IDS" ]; then
            ALL_IDS="$PARENT_IDS,$CHILD_IDS"
          fi
          # Delete task_history
          curl -s -X DELETE "$SB_URL/task_history?task_id=in.($ALL_IDS)" \
            -H "apikey: $SB_KEY" -H "Authorization: Bearer $SB_KEY" >/dev/null
          # Delete children
          if [ -n "$CHILD_IDS" ]; then
            curl -s -X DELETE "$SB_URL/tasks?id=in.($CHILD_IDS)" \
              -H "apikey: $SB_KEY" -H "Authorization: Bearer $SB_KEY" >/dev/null
          fi
          # Delete parents
          curl -s -X DELETE "$SB_URL/tasks?id=in.($PARENT_IDS)" \
            -H "apikey: $SB_KEY" -H "Authorization: Bearer $SB_KEY" >/dev/null
          echo "Test data cleaned up"

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          retention-days: 7

      - name: Upload debug screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          path: "*.png"
          retention-days: 3
